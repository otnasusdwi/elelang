services:
  db:
    image: mysql:8.0
    container_name: elelang-db
    environment:
      MYSQL_DATABASE: elelang
      MYSQL_USER: elelang
      MYSQL_PASSWORD: elelangpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: elelang-redis
    ports:
      - "6379:6379"

  # ✅ NEW: soketi (WebSocket server - Pusher protocol)
  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: elelang-soketi
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: "elelang"
      SOKETI_DEFAULT_APP_KEY: "elelang_key"
      SOKETI_DEFAULT_APP_SECRET: "elelang_secret"
    ports:
      - "6001:6001"
      - "9601:9601" # optional metrics
    depends_on:
      - redis

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: elelang-api
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: elelang
      DB_USERNAME: elelang
      DB_PASSWORD: elelangpass

      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis

      # ✅ CHANGE: broadcasting pakai pusher (ke soketi)
      BROADCAST_DRIVER: pusher
      PUSHER_APP_ID: elelang
      PUSHER_APP_KEY: elelang_key
      PUSHER_APP_SECRET: elelang_secret
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1

    volumes:
      - ./apps/api:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      soketi:
        condition: service_started

  queue:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: elelang-queue
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      APP_ENV: local

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: elelang
      DB_USERNAME: elelang
      DB_PASSWORD: elelangpass

      QUEUE_CONNECTION: redis
      REDIS_HOST: redis

      # ✅ biar event queued juga konsisten (opsional)
      BROADCAST_DRIVER: pusher
      PUSHER_APP_ID: elelang
      PUSHER_APP_KEY: elelang_key
      PUSHER_APP_SECRET: elelang_secret
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1

    volumes:
      - ./apps/api:/var/www/html
    depends_on:
      - api
      - redis
      - db
      - soketi

  scheduler:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: elelang-scheduler
    command: php artisan schedule:work
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: elelang
      DB_USERNAME: elelang
      DB_PASSWORD: elelangpass
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      BROADCAST_DRIVER: pusher
      PUSHER_APP_ID: elelang
      PUSHER_APP_KEY: elelang_key
      PUSHER_APP_SECRET: elelang_secret
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1
    volumes:
      - ./apps/api:/var/www/html
    depends_on:
      - api
      - db
      - redis

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: elelang-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE: "http://localhost:8080/api"

      # ✅ untuk laravel-echo + pusher-js di React
      VITE_PUSHER_KEY: "elelang_key"
      VITE_WS_HOST: "localhost"
      VITE_WS_PORT: "6001"
      VITE_PUSHER_CLUSTER: "mt1"

    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  dbdata:
